# Requires the `docs` dependency group: uv sync (mkdocs-material + mkdocstrings)
site_name: agent-toolkit-cli
site_description: Python CLI and Textual TUI for managing AI-agent skills across harnesses
site_url: https://ajanderson1.github.io/agent-toolkit-cli/
repo_url: https://github.com/ajanderson1/agent-toolkit-cli

strict: true

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn
  anchors: warn

# Internal artifacts — for humans/agents reading the repo, not the published
# site: brainstorms, specs/plans, solution notes, audits, research.
# See ~/.conventions/conventions/mkdocs.md § Exclusions.
# NOT excluded: agent-toolkit/harness-matrix.md — the machine-read SSOT (wheel
# data + parity tests) is published as the data page behind docs/matrix.md and
# docs/harnesses/* (views generated by scripts/gen_harness_docs.py).
exclude_docs: |
  superpowers/
  solutions/
  audit/
  agent-toolkit/research/

theme:
  name: material
  palette:
    - media: '(prefers-color-scheme)'
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - navigation.instant.progress
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      enabled: !ENV [ENABLE_MKDOCSTRINGS, true]
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
  # Preserve inbound links after the #355 kind→asset-type page rename (#364):
  # docs/kinds/* was git-mv'd to docs/asset-types/* with no redirect mapping.
  - redirects:
      redirect_maps:
        kinds/instructions.md: asset-types/instructions.md
        kinds/skills.md: asset-types/skills.md
        kinds/agents.md: asset-types/agents.md
        kinds/pi-extensions.md: asset-types/pi-extensions.md
        kinds/mcp.md: asset-types/mcp.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      base_path: ['.']
      check_paths: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

nav:
