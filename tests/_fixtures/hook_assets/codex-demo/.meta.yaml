apiVersion: agent-toolkit/v1alpha2
metadata:
  name: codex-demo
  description: Demo hook used by round-trip and TUI smoke tests.
  kind: hook
  lifecycle: experimental
spec:
  origin: first-party
  vendored_via: none
  harnesses: [codex]
  hook:
    events: [PreToolUse]
    command: check.sh
    matcher: "^Bash$"
    timeout: 10
