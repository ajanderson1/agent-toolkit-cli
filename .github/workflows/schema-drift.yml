name: schema-drift

on:
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'src/agent_toolkit/_schemas/**'
      - '.github/workflows/schema-drift.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'src/agent_toolkit/_schemas/**'
      - '.github/workflows/schema-drift.yml'
  schedule:
    # Daily catch — assets repo can change without poking this repo.
    - cron: '17 6 * * *'

jobs:
  diff-vs-ssot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this repo
        uses: actions/checkout@v4

      - name: Checkout assets repo (SSOT)
        uses: actions/checkout@v4
        with:
          repository: ajanderson1/agent-toolkit
          path: assets-repo

      - name: Diff vendored schema vs SSOT
        run: |
          set -euo pipefail
          diff -u \
            assets-repo/schemas/asset-frontmatter.v1alpha1.json \
            schemas/asset-frontmatter.v1alpha1.json
          diff -u \
            assets-repo/schemas/asset-frontmatter.v1alpha1.json \
            src/agent_toolkit/_schemas/asset-frontmatter.v1alpha1.json
          echo "Schema in sync with SSOT."
